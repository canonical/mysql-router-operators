name: Tests

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-1
  cancel-in-progress: true

on:
  pull_request:
    paths-ignore:
      - '**.md'
      - '.gitattributes'
      - '.github/renovate.json5'
  schedule:
    - cron: '53 0 * * *'  # Daily at 00:53 UTC
  # Triggered on push to branch "dpe" by .github/workflows/release.yaml
  workflow_call:
    outputs:
      artifact-prefix:
        description: build_charm.yaml `artifact-prefix` output
        value: ${{ jobs.build.outputs.artifact-prefix }}

jobs:
  lint:
    strategy:
      matrix:
        path:
          - kubernetes
          - machines
    name: Lint | ${{ matrix.path }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install terraform
        run: |
          sudo snap install terraform --classic
      - name: Install tox & poetry
        run: |
          pipx install tox
          pipx install poetry
      - name: Run linters
        working-directory: ${{ matrix.path }}
        run: |
          tox run -e lint
          tox run -e lint-terraform

  build:
    strategy:
      matrix:
        path:
          - kubernetes
          - machines
    name: Build charm | ${{ matrix.path }}
    uses: canonical/data-platform-workflows/.github/workflows/build_charm.yaml@v36.0.1
    with:
      path-to-charm-directory: ${{ matrix.path }}

  release:
    name: Release charm to Charmhub branch
    needs:
      - build
    uses: canonical/data-platform-workflows/.github/workflows/release_charm_pr.yaml@v36.0.1
    with:
      track: '8.0'
      artifact-prefix: ${{ needs.build.outputs.artifact-prefix }}
      path-to-charm-directory: kubernetes
    secrets:
      charmhub-token: ${{ secrets.CHARMHUB_TOKEN }}

  integration-test:
    name: Integration test charm
    needs:
      - lint
      - build
    uses: ./.github/workflows/integration_test_charms.yaml
    with:
      artifact-prefix: ${{ needs.build.outputs.artifact-prefix }}
    secrets: inherit
    permissions:
      contents: write  # Needed for Allure Report
