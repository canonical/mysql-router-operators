summary: test_architecture_new.py
environment:
  TEST_MODULE: test_architecture_new.py
execute: |
  tox run -e integration -- "tests/integration/integration/$TEST_MODULE" --alluredir="$SPREAD_TASK/allure-results"
artifacts:
  - allure-results
backends:
  - -lxd-vm  # This task requires charm built on different architecture from host
