name: mysql-router-k8s
display-name: MySQL Router K8s
summary: Charmed MySQL Router K8s operator
description: |
  Enables effective access to a MySQL cluster with Group Replication.

  This charm supports MySQL Router 8.0 in Kubernetes environments.
docs: https://discourse.charmhub.io/t/charmed-mysql-router-k8s-documentation/12130
source: https://github.com/canonical/mysql-router-operators
issues: https://github.com/canonical/mysql-router-operators/issues
website:
  - https://canonical.com/data/mysql
  - https://charmhub.io/mysql-router-k8s
  - https://github.com/canonical/mysql-router-operators
  - https://chat.charmhub.io/charmhub/channels/data-platform
maintainers:
  - Canonical Data Platform <data-platform@lists.launchpad.net>

containers:
  mysql-router:
    resource: mysql-router-image
provides:
  database:
    interface: mysql_client
  metrics-endpoint:
    interface: prometheus_scrape
    optional: true
  grafana-dashboard:
    interface: grafana_dashboard
    optional: true
requires:
  backend-database:
    interface: mysql_client
    limit: 1
  certificates:
    interface: tls-certificates
    limit: 1
    optional: true
  logging:
    interface: loki_push_api
    limit: 1
    optional: true
  tracing:
    interface: tracing
    optional: true
    limit: 1
peers:
  tls:
    interface: tls
  cos:
    interface: cos
  refresh-v-three:
    interface: refresh
  mysql-router-peers:
    interface: mysql_router_peers
resources:
  mysql-router-image:
    type: oci-image
    description: OCI image for mysql-router
    upstream-source: ghcr.io/canonical/charmed-mysql@sha256:672f20830d66678a3ece7285048700d6e52a9393202eb51e9749eb35031559c4
assumes:
  - k8s-api
