name: TICS scan

on:
  workflow_call:
    inputs:
      operator:
        description: Operator directory to scan (kubernetes or machines)
        required: true
        type: string
      ref:
        description: Branch ref to checkout (e.g. dpe)
        required: true
        type: string
      project:
        description: TICS project name (e.g. mysql-router-k8s-8.0)
        required: true
        type: string
    secrets:
      TICSAUTHTOKEN:
        required: true

jobs:
  TICS:
    runs-on: [ubuntu-24.04]
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          sparse-checkout: |
            ${{ inputs.operator }}
          ref: ${{ inputs.ref }}

      - name: Create and activate virtual environment
        run: |
          sudo apt update && sudo apt install -y python3-venv
          python3 -m venv .venv
          . .venv/bin/activate
          pip install flake8 poetry pylint pytest tox
          echo PATH="$PATH" >> "$GITHUB_ENV"

      - name: Run coverage tests
        env:
          OPERATOR: ${{ inputs.operator }}
        run: |
          tox -e unit -c "$OPERATOR/tox.ini"

      - name: Coverage reports for TICS
        env:
          OPERATOR: ${{ inputs.operator }}
        run: |
          mkdir -p "$OPERATOR/.cover"
          cp "$OPERATOR/coverage.xml" "$OPERATOR/.cover/cobertura.xml"

      - name: TICS GitHub Action
        uses: tiobe/tics-github-action@v3
        with:
          mode: qserver
          project: ${{ inputs.project }}
          viewerUrl: https://canonical.tiobe.com/tiobeweb/TICS/api/cfg?name=default
          branchdir: ${{ env.GITHUB_WORKSPACE }}
          ticsAuthToken: ${{ secrets.TICSAUTHTOKEN }}  # zizmor: ignore[secrets-outside-env] Organization secret (does not support environments: https://github.com/orgs/community/discussions/15379)
          installTics: true
          calc: ALL
    permissions: {}
